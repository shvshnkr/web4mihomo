{% extends "base.html" %}
{% block title %}Вход — web4mihomo{% endblock %}
{% block body %}
  <div class="mx-auto max-w-md rounded-xl border border-slate-800 bg-slate-900/40 p-8 shadow-lg">
    <h1 class="text-xl font-semibold">Вход</h1>
    <p class="mt-2 text-sm text-slate-400">Введите пароль веб-интерфейса.</p>
    {% if error %}
      <p class="mt-4 rounded-md border border-red-900/60 bg-red-950/40 px-3 py-2 text-sm text-red-200">
        {{ error }}
      </p>
    {% endif %}
    <form method="post" action="/login" class="mt-6 space-y-4">
      <input type="hidden" name="next" value="{{ next_url }}" />
      <div>
        <label class="mb-1 block text-sm text-slate-300" for="password">Пароль</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          class="w-full rounded-md border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none ring-emerald-500/40 focus:ring-2"
          required
        />
      </div>
      <button
        type="submit"
        class="w-full rounded-md bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-500"
      >
        Войти
      </button>
    </form>
  </div>
{% endblock %}
